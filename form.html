<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Laporan Zakat Fitrah & Fidyah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        input:focus, select:focus { outline: none; box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2); }
        label { display: block; font-size: 0.875rem; font-weight: 600; color: #374151; margin-bottom: 0.25rem; }
        input::placeholder { color: #9ca3af; font-size: 0.8rem; font-weight: 400; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen py-10 px-4">

    <div class="max-w-3xl mx-auto bg-white p-6 md:p-10 rounded-2xl shadow-xl">
        
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-green-800">Laporan ZIS & DSKL</h1>
            <p class="text-gray-500 mt-1 italic text-sm">Formulir Laporan Pengumpulan dan Penyaluran UPZ</p>
            <div class="mt-4 inline-block bg-red-50 px-4 py-2 rounded-lg border border-red-100">
                <p class="text-xs text-red-600 font-bold uppercase tracking-wide">* Wajib diisi. Masukkan angka 0 jika data nihil.</p>
            </div>
        </div>

        <form id="zakatForm" class="space-y-8">
            
            <div id="sec-1" class="bg-gray-50 p-6 rounded-xl border border-gray-200 fade-in">
                <h2 class="text-lg font-bold text-gray-800 mb-5 flex items-center">
                    <span class="bg-green-700 text-white w-7 h-7 rounded-full flex items-center justify-center mr-3 text-sm">1</span>
                    Identitas UPZ / Lembaga
                </h2>
                <div class="grid grid-cols-1 gap-5">
                    <div>
                        <label>Nama UPZ Masjid/Mushola</label>
                        <input type="text" name="nama_upz" required class="w-full p-3 border rounded-lg" placeholder="Contoh: Masjid Agung Al-Atiq">
                    </div>
                    <div>
                        <label>Alamat Lengkap</label>
                        <input type="text" name="alamat" required class="w-full p-3 border rounded-lg" placeholder="Contoh: Jl. Sukowati No. 1, Kalicacing">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label>Nama PIC (Penanggung Jawab)</label>
                            <input type="text" name="nama_pic" required class="w-full p-3 border rounded-lg" placeholder="Contoh: H. Ahmad Fauzi">
                        </div>
                        <div>
                            <label>Nomor HP/WA</label>
                            <input type="tel" name="nomor_hp" required class="w-full p-3 border rounded-lg" placeholder="Contoh: 081234567890">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label>Kecamatan</label>
                            <select id="kecamatan" name="kecamatan" required class="w-full p-3 border rounded-lg">
                                <option value="">-- Pilih Kecamatan --</option>
                                <option value="Argomulyo">Argomulyo</option>
                                <option value="Sidomukti">Sidomukti</option>
                                <option value="Sidorejo">Sidorejo</option>
                                <option value="Tingkir">Tingkir</option>
                            </select>
                        </div>
                        <div>
                            <label>Kelurahan</label>
                            <select id="kelurahan" name="kelurahan" required disabled class="w-full p-3 border rounded-lg bg-gray-100">
                                <option value="">-- Pilih Kelurahan --</option>
                            </select>
                        </div>
                    </div>
                </div>
                <button type="button" onclick="showNext(2)" class="mt-8 w-full bg-green-700 hover:bg-green-800 text-white font-bold py-3.5 rounded-lg shadow-md transition-all">Lanjut ke Pengumpulan &rarr;</button>
            </div>

            <div id="sec-2" class="hidden fade-in">
                <h2 class="text-xl font-bold text-white bg-green-700 px-5 py-4 rounded-t-xl">2. Data Pengumpulan ZIS</h2>
                <div class="grid grid-cols-1 gap-6 p-6 border-x border-b border-green-200 rounded-b-xl bg-green-50/20">
                    <div class="bg-white p-5 border rounded-xl shadow-sm">
                        <label class="text-green-800 border-b mb-3 pb-1">Zakat Mal</label>
                        <div class="space-y-3">
                            <div><label>Total Perolehan (Rp)</label><input type="text" inputmode="numeric" name="mal_rp" required class="format-ribuan w-full p-3 border rounded" placeholder="Contoh: 1.500.000"></div>
                            <div><label>Jumlah Muzaki (Jiwa)</label><input type="text" inputmode="numeric" name="mal_muzaki" required class="format-ribuan w-full p-3 border rounded" placeholder="Contoh: 10"></div>
                        </div>
                    </div>
                    <div class="bg-white p-5 border rounded-xl shadow-sm">
                        <label class="text-green-800 border-b mb-3 pb-1">Zakat Fitrah (Beras)</label>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <div><label>Total (Kg)</label><input type="text" inputmode="decimal" name="fitrah_beras_kg" required class="format-desimal w-full p-3 border rounded" placeholder="Contoh: 250,5"></div>
                            <div><label>Total (Liter)</label><input type="text" inputmode="decimal" name="fitrah_beras_ltr" required class="format-desimal w-full p-3 border rounded" placeholder="Contoh: 300"></div>
                        </div>
                        <div><label>Jumlah Muzaki (Jiwa)</label><input type="text" inputmode="numeric" name="fitrah_beras_muzaki" required class="format-ribuan w-full p-3 border rounded" placeholder="Contoh: 100"></div>
                    </div>
                    <div class="bg-white p-5 border rounded-xl shadow-sm">
                        <label class="text-green-800 border-b mb-3 pb-1">Zakat Fitrah (Uang)</label>
                        <div class="space-y-3">
                            <div><label>Total Perolehan (Rp)</label><input type="text" inputmode="numeric" name="fitrah_uang_rp" required class="format-ribuan w-full p-3 border rounded" placeholder="Contoh: 3.500.000"></div>
                            <div><label>Jumlah Muzaki (Jiwa)</label><input type="text" inputmode="numeric" name="fitrah_uang_muzaki" required class="format-ribuan w-full p-3 border rounded" placeholder="Contoh: 80"></div>
                        </div>
                    </div>
                    <div class="bg-white p-5 border rounded-xl shadow-sm">
                        <label class="text-green-800 border-b mb-3 pb-1">Infak Sedekah</label>
                        <div class="space-y-3">
                            <div><label>Total Perolehan (Rp)</label><input type="text" inputmode="numeric" name="infak_rp" required class="format-ribuan w-full p-3 border rounded" placeholder="Contoh: 500.000"></div>
                            <div><label>Jumlah Munfiq (Jiwa)</label><input type="text" inputmode="numeric" name="infak_munfiq" required class="format-ribuan w-full p-3 border rounded" placeholder="Contoh: 50"></div>
                        </div>
                    </div>
                    <button type="button" onclick="showNext(3)" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-lg shadow transition-all">Lanjut ke Pengumpulan DSKL &rarr;</button>
                </div>
            </div>

            <div id="sec-3" class="hidden fade-in">
                <h2 class="text-xl font-bold text-white bg-blue-700 px-5 py-4 rounded-t-xl">3. Data Pengumpulan DSKL</h2>
                <div class="grid grid-cols-1 gap-6 p-6 border-x border-b border-blue-200 rounded-b-xl bg-blue-50/20">
                    <div class="bg-white p-5 border rounded-xl shadow-sm">
                        <label class="text-blue-800 border-b mb-3 pb-1">Fidyah</label>
                        <div class="space-y-3">
                            <div><label>Total Perolehan (Rp)</label><input type="text" inputmode="numeric" name="fidyah_rp" required class="format-ribuan w-full p-3 border rounded" placeholder="Contoh: 450.000"></div>
                            <div><label>Jumlah Munfiq (Jiwa)</label><input type="text" inputmode="numeric" name="fidyah_munfiq" required class="format-ribuan w-full p-3 border rounded" placeholder="Contoh: 15"></div>
                        </div>
                    </div>
                    <div class="bg-white p-5 border rounded-xl shadow-sm">
                        <label class="text-blue-800 border-b mb-3 pb-1">Kafarat</label>
                        <div class="space-y-3">
                            <div><label>Total Perolehan (Rp)</label><input type="text" inputmode="numeric" name="kafarat_rp" required class="format-ribuan w-full p-3 border rounded" placeholder="Contoh: 600.000"></div>
                            <div><label>Jumlah Munfiq (Jiwa)</label><input type="text" inputmode="numeric" name="kafarat_munfiq" required class="format-ribuan w-full p-3 border rounded" placeholder="Contoh: 5"></div>
                        </div>
                    </div>
                    <button type="button" onclick="showNext(4)" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3.5 rounded-lg shadow transition-all">Lanjut ke Penyaluran ZIS &rarr;</button>
                </div>
            </div>

            <div id="sec-4" class="hidden fade-in">
                <h2 class="text-xl font-bold text-white bg-orange-700 px-5 py-4 rounded-t-xl">4. Data Penyaluran ZIS</h2>
                <div class="grid grid-cols-1 gap-6 p-6 border-x border-b border-orange-200 rounded-b-xl bg-orange-50/20">
                    <div class="bg-white p-5 border rounded-xl shadow-sm">
                        <label class="text-orange-800 border-b mb-3 pb-1">Penyaluran Zakat Mal</label>
                        <div class="space-y-3">
                            <div><label>Total Disalurkan (Rp)</label><input type="text" inputmode="numeric" name="salur_mal_rp" required class="format-ribuan w-full p-3 border rounded" placeholder="Contoh: 1.500.000"></div>
                            <div><label>Jumlah Mustahik (Jiwa)</label><input type="text" inputmode="numeric" name="salur_mal_mustahik" required class="format-ribuan w-full p-3 border rounded" placeholder="Contoh: 20"></div>
                        </div>
                    </div>
                    <div class="bg-white p-5 border rounded-xl shadow-sm">
                        <label class="text-orange-800 border-b mb-3 pb-1">Penyaluran Zakat Fitrah (Beras)</label>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <div><label>Disalurkan (Kg)</label><input type="text" inputmode="decimal" name="salur_fitrah_beras_kg" required class="format-desimal w-full p-3 border rounded" placeholder="Contoh: 250,5"></div>
                            <div><label>Disalurkan (Ltr)</label><input type="text" inputmode="decimal" name="salur_fitrah_beras_ltr" required class="format-desimal w-full p-3 border rounded" placeholder="Contoh: 300"></div>
                        </div>
                        <div><label>Jumlah Mustahik (Jiwa)</label><input type="text" inputmode="numeric" name="salur_fitrah_beras_mustahik" required class="format-ribuan w-full p-3 border rounded" placeholder="Contoh: 150"></div>
                    </div>
                    <div class="bg-white p-5 border rounded-xl shadow-sm">
                        <label class="text-orange-800 border-b mb-3 pb-1">Penyaluran Zakat Fitrah (Uang)</label>
                        <div class="space-y-3">
                            <div><label>Total Disalurkan (Rp)</label><input type="text" inputmode="numeric" name="salur_fitrah_uang_rp" required class="format-ribuan w-full p-3 border rounded" placeholder="Contoh: 3.500.000"></div>
                            <div><label>Jumlah Mustahik (Jiwa)</label><input type="text" inputmode="numeric" name="salur_fitrah_uang_mustahik" required class="format-ribuan w-full p-3 border rounded" placeholder="Contoh: 100"></div>
                        </div>
                    </div>
                    <div class="bg-white p-5 border rounded-xl shadow-sm">
                        <label class="text-orange-800 border-b mb-3 pb-1">Penyaluran Infak Sedekah</label>
                        <div class="space-y-3">
                            <div><label>Total Disalurkan (Rp)</label><input type="text" inputmode="numeric" name="salur_infak_rp" required class="format-ribuan w-full p-3 border rounded" placeholder="Contoh: 500.000"></div>
                            <div><label>Jumlah Mustahik (Jiwa)</label><input type="text" inputmode="numeric" name="salur_infak_mustahik" required class="format-ribuan w-full p-3 border rounded" placeholder="Contoh: 40"></div>
                        </div>
                    </div>
                    <button type="button" onclick="showNext(5)" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3.5 rounded-lg shadow transition-all">Lanjut ke Penyaluran DSKL &rarr;</button>
                </div>
            </div>

            <div id="sec-5" class="hidden fade-in">
                <h2 class="text-xl font-bold text-white bg-teal-700 px-5 py-4 rounded-t-xl">5. Penyaluran DSKL & Selesai</h2>
                <div class="grid grid-cols-1 gap-6 p-6 border-x border-b border-teal-200 rounded-b-xl bg-teal-50/20">
                    <div class="bg-white p-5 border rounded-xl shadow-sm">
                        <label class="text-teal-800 border-b mb-3 pb-1">Penyaluran Fidyah</label>
                        <div class="space-y-3">
                            <div><label>Total Disalurkan (Rp)</label><input type="text" inputmode="numeric" name="salur_fidyah_rp" required class="format-ribuan w-full p-3 border rounded" placeholder="Contoh: 450.000"></div>
                            <div><label>Jumlah Mustahik (Jiwa)</label><input type="text" inputmode="numeric" name="salur_fidyah_mustahik" required class="format-ribuan w-full p-3 border rounded" placeholder="Contoh: 30"></div>
                        </div>
                    </div>
                    <div class="bg-white p-5 border rounded-xl shadow-sm">
                        <label class="text-teal-800 border-b mb-3 pb-1">Penyaluran Kafarat</label>
                        <div class="space-y-3">
                            <div><label>Total Disalurkan (Rp)</label><input type="text" inputmode="numeric" name="salur_kafarat_rp" required class="format-ribuan w-full p-3 border rounded" placeholder="Contoh: 600.000"></div>
                            <div><label>Jumlah Mustahik (Jiwa)</label><input type="text" inputmode="numeric" name="salur_kafarat_mustahik" required class="format-ribuan w-full p-3 border rounded" placeholder="Contoh: 10"></div>
                        </div>
                    </div>
                    <button type="submit" id="submitBtn" class="mt-4 w-full bg-gray-900 hover:bg-black text-white font-bold py-4 rounded-xl shadow-lg text-lg uppercase tracking-wider">Kirim Laporan Ke BAZNAS</button>
                </div>
            </div>
        </form>

        <footer class="mt-12 pt-8 border-t border-gray-100 text-center text-gray-400 text-xs font-bold tracking-widest uppercase">
            BAZNAS KOTA SALATIGA &copy; 2026
        </footer>
    </div>

    <script>
        const dataWilayah = {"Argomulyo": ["Noborejo", "Tegalrejo", "Kumpulrejo", "Cebongan", "Ledok", "Randuacir"],"Sidomukti": ["Mangunsari", "Dukuh", "Kalicacing", "Kecandran"],"Sidorejo": ["Blotongan", "Salatiga", "Pulutan", "Sidorejo Lor", "Bugel", "Kauman Kidul"],"Tingkir": ["Kutowinangun Lor", "Kutowinangun Kidul", "Sidorejo Kidul", "Gendongan", "Kalibening", "Tingkir Lor", "Tingkir Tengah"]};
        document.getElementById('kecamatan').addEventListener('change', function() {const kelSelect = document.getElementById('kelurahan');kelSelect.innerHTML = '<option value="">-- Pilih Kelurahan --</option>';if (this.value) {kelSelect.disabled = false;kelSelect.classList.remove('bg-gray-100');dataWilayah[this.value].forEach(kel => {let opt = document.createElement('option'); opt.value = opt.textContent = kel; kelSelect.appendChild(opt);});}});
        function showNext(step) {const currentSec = document.getElementById('sec-' + (step - 1));const inputs = currentSec.querySelectorAll('input[required], select[required]');let valid = true;inputs.forEach(i => { if(!i.value.trim()){ i.classList.add('border-red-500'); valid = false; } else { i.classList.remove('border-red-500'); } });if (!valid) { alert('Lengkapi data yang kosong!'); return; }document.getElementById('sec-' + step).classList.remove('hidden');event.target.classList.add('hidden');document.getElementById('sec-' + step).scrollIntoView({ behavior: 'smooth' });}
        document.querySelectorAll('.format-ribuan').forEach(i => i.addEventListener('input', function() {let v = this.value.replace(/[^0-9]/g, '');this.value = v ? parseInt(v).toLocaleString('id-ID') : '';}));
        document.querySelectorAll('.format-desimal').forEach(i => i.addEventListener('input', function() {let v = this.value.replace(/[^0-9,]/g, ''), p = v.split(',');if(p[0]) p[0] = parseInt(p[0].replace(/\./g, '')).toLocaleString('id-ID');this.value = p.join(',');}));
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyBldfZnWo8htFbf7DDbqloEnD9NtY8ZQTa1V0lkdS35yJMPqQ-Oqk4m-BvJ4RaMYbu/exec';
        document.getElementById('zakatForm').addEventListener('submit', e => {e.preventDefault();const btn = document.getElementById('submitBtn');btn.disabled = true; btn.textContent = 'MENGIRIM...';const formData = new FormData(e.target);document.querySelectorAll('.format-ribuan').forEach(i => formData.set(i.name, i.value.replace(/\./g, '')));document.querySelectorAll('.format-desimal').forEach(i => formData.set(i.name, i.value.replace(/\./g, '').replace(/,/g, '.')));fetch(scriptURL, { method: 'POST', body: formData }).then(() => { alert('Alhamdulillah, Laporan Berhasil Terkirim!'); window.location.reload(); }).catch(() => { alert('Gagal mengirim laporan!'); btn.disabled = false; btn.textContent = 'KIRIM LAPORAN KE BAZNAS'; });});
    </script>
</body>
</html>
